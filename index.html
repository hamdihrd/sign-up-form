<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-up-form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="left">
        <div class="logo-container">
          <img src="images/odin-logo.png" alt="logo" class="logo" />
          <h1>ODIN</h1>
        </div>
        <div class="image-credit">
          Photo by
          <a
            href="https://unsplash.com/@haliewestphoto?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
            >Halie West</a
          >
          on
          <a
            href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
            >Unsplash</a
          >
        </div>
      </div>
      <div class="right">
        <form action="" method="post">
          <div class="form-header">
            <p>
              This is not a real online service! you know you need something
              like this in your life to help you realize your deepest dreams.
              <br />

              Sign up <span>now</span> to get started.
              <br />
            </p>
            <br />

            <p>You <span>know</span> you want to.</p>
          </div>

          <fieldset>
            <legend>Let's do this!</legend>
            <div class="form-main">
              <div class="elements">
                <label for="first-name"> First Name </label>
                <input
                  type="text"
                  id="first-name"
                  placeholder="First Name  only letters"
                  pattern="[a-zA-Z]{2,}"
                  name="first-name"
                />
              </div>

              <div class="elements">
                <label for="last-name"> Last Name </label>
                <input
                  type="text"
                  id="last-name"
                  placeholder="Last Name  only letters"
                  pattern="[a-zA-Z]{2,}"
                  name="last-name"
                />
              </div>

              <div class="elements">
                <label for="email"> Email </label>
                <input
                  type="email"
                  id="email"
                  placeholder="Email"
                  name="email"
                />
              </div>

              <div class="elements">
                <label for="phone"> Phone Number </label>
                <input
                  type="tel"
                  id="phone"
                  placeholder="Phone Number only digits"
                  pattern="[0-9]{10}"
                  name="phone"
                />
              </div>

              <div class="elements">
                <label for="password"> Password </label>
                <input
                  type="password"
                  id="password"
                  placeholder="Password min 8 with 1 digit 1 symbol"
                  name="password"
                  pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                  required
                />
              </div>

              <div class="elements">
                <label for="confirm-password"> Confirm Password </label>
                <input
                  type="password"
                  id="confirm-password"
                  placeholder="Confirm Password"
                  name="confirm-password"
                  required
                />
              </div>
            </div>
          </fieldset>
          <div class="form-footer">
            <button type="submit">Create Account</button>
            <p>Already have an account? <a href="#">Log in</a></p>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
