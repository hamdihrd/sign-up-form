<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-up-form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="left">
        <div class="logo-container">
          <img src="images/odin-logo.png" alt="logo" class="logo" />
          <h1>ODIN</h1>
        </div>
        <div class="image-credit">Photo by Halie West on Unsplash</div>
      </div>
      <div class="right">
        <div class="bg-top"></div>
        <div class="bg-bottom"></div>
        <div class="header">
          <p>
            This is not a real online service! you know you need something like
            this in your life to help you realize your deepest dreams. <br />
            Sign up <span>now</span> to get started.
          </p>
          <p>You <span>know</span> you want to.</p>

          <legend>Let's do this!</legend>
        </div>

        <div class="form">
          <form>
            <div class="elements">
              <label for="first-name"> First Name </label>
              <input
                type="text"
                id="first-name"
                placeholder="First Name"
                name="first-name"
              />
            </div>

            <div class="elements">
              <label for="last-name"> Last Name </label>
              <input
                type="text"
                id="last-name"
                placeholder="Last Name"
                name="last-name"
              />
            </div>

            <div class="elements">
              <label for="email"> Email </label>
              <input type="email" id="email" placeholder="Email" name="email" />
            </div>

            <div class="elements">
              <label for="phone"> Phone Number </label>
              <input
                type="tel"
                id="phone"
                placeholder="Phone Number"
                name="phone"
              />
            </div>

            <div class="elements">
              <label for="password"> Password </label>
              <input
                type="password"
                id="password"
                placeholder="Password"
                name="password"
              />
            </div>

            <div class="elements">
              <label for="confirm-password"> Confirm Password </label>
              <input
                type="password"
                id="confirm-password"
                placeholder="Confirm Password"
                name="confirm-password"
              />
            </div>
            <div class="buttons">
              <button type="submit">Create Account</button>
              <p>Already have an account? <a href="#">Log in</a></p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
